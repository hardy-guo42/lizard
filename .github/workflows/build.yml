name: Build Lizard Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch_suffix: x86_64
            artifact_name: lizard-linux-x86_64-centos7
          - platform: linux/arm64/v8
            arch_suffix: arm64
            artifact_name: lizard-linux-arm64-centos7

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Repository Configuration
        run: |
          # Create repository configuration
          mkdir -p docker-context
          cat << 'REPO_EOF' > docker-context/CentOS-Base.repo
          [base]
          name=CentOS-$releasever - Base
          baseurl=http://vault.centos.org/centos/$releasever/os/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7

          [updates]
          name=CentOS-$releasever - Updates
          baseurl=http://vault.centos.org/centos/$releasever/updates/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7

          [extras]
          name=CentOS-$releasever - Extras
          baseurl=http://vault.centos.org/centos/$releasever/extras/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7
          
          [centosplus]
          name=CentOS-$releasever - Plus
          baseurl=http://vault.centos.org/centos/$releasever/centosplus/$basearch/
          gpgcheck=1
          enabled=0
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7
          REPO_EOF

          # Create Dockerfile
          cat << 'EOF' > docker-context/Dockerfile
          ARG TARGETPLATFORM
          FROM --platform=${TARGETPLATFORM} centos:7

          # Verify glibc version is 2.17
          RUN ldd --version | head -1

          # Copy repository configuration
          COPY CentOS-Base.repo /etc/yum.repos.d/

          # Import GPG key
          RUN curl -o /etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7 https://www.centos.org/keys/RPM-GPG-KEY-CentOS-7

          # Fix locale settings and install basic tools
          RUN yum clean all && \
              yum update -y && \
              yum install -y deltarpm && \
              yum update -y && \
              yum install -y \
                  centos-release-scl \
                  info \
                  texinfo && \
              yum install -y \
                  rh-python36 \
                  rh-python36-python-devel \
                  gcc \
                  make \
                  which \
                  findutils && \
              yum clean all && \
              rm -rf /var/cache/yum

          # Enable SCL and install Python dependencies
          RUN scl enable rh-python36 'pip install --upgrade pip setuptools wheel' && \
              scl enable rh-python36 'pip install pyinstaller pygments pathspec'

          WORKDIR /build
          COPY . .

          RUN scl enable rh-python36 'python setup.py install'
          RUN scl enable rh-python36 'pyinstaller --onefile --name=lizard --distpath=/build/dist lizard.py'

          FROM --platform=${TARGETPLATFORM} centos:7
          COPY --from=0 /build/dist/lizard /usr/local/bin/lizard
          RUN chmod +x /usr/local/bin/lizard
          CMD ["/usr/local/bin/lizard"]
          EOF

          # Copy source code to docker context
          cp -r . docker-context/src
          cd docker-context && mv src/* . && rmdir src

      - name: Build with Docker (CentOS 7 - glibc 2.17)
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --tag lizard-builder:${{ matrix.arch_suffix }} \
            -f docker-context/Dockerfile \
            --output type=docker \
            docker-context

      - name: Extract Binary from Docker Image
        run: |
          mkdir -p ./dist
          docker run --rm \
            -v $(pwd)/dist:/output \
            lizard-builder:${{ matrix.arch_suffix }} \
            sh -c 'cp /usr/local/bin/lizard /output/lizard-linux-${{ matrix.arch_suffix }}'

      - name: Verify Binary Compatibility
        run: |
          file ./dist/lizard-linux-${{ matrix.arch_suffix }}
          ldd ./dist/lizard-linux-${{ matrix.arch_suffix }} || echo "Binary is statically linked or uses non-standard libc"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lizard-linux_${{ matrix.arch_suffix }}-binary
          path: ./dist/lizard-linux-${{ matrix.arch_suffix }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/lizard-linux_x86-binary/lizard-linux-x86_64
            ./artifacts/lizard-linux_arm-binary/lizard-linux-arm64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
