name: Build Lizard Binaries (Docker-based glibc 2.17 Compatible)

on:
  workflow_dispatch: # 允许手动触发
  push:
    tags:
      - 'v*' # 当推送标签时自动触发，例如 v1.0.0

jobs:
  build_windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install nuitka zstandard
          pip install .
      - name: Build Binary
        shell: bash
        run: |
          python -m nuitka --standalone --onefile --include-package=lizard --output-filename=lizard-windows-x64.exe lizard.py
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lizard-windows-x64.exe
          path: lizard-windows-x64.exe

  build_linux_docker:
    runs-on: ubuntu-22.04 # 使用一个支持 Docker 的 runner
    steps:
      - uses: actions/checkout@v4
      
      # 复制 Dockerfile.build 到根目录（如果它不在那里）
      # - name: Prepare Dockerfile
      #   run: cp Dockerfile.build ./Dockerfile # 如果你把 Dockerfile 放在别处

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with Docker
        run: |
          docker build -f Dockerfile.build -t lizard-builder .
          # 从构建成功的容器中复制生成的二进制文件
          mkdir -p ./dist
          docker create --name temp_container lizard-builder
          docker cp temp_container:/app/lizard-linux-x64-glibc217 ./dist/
          docker rm -f temp_container

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lizard-linux-x64-glibc217
          path: dist/lizard-linux-x64-glibc217
