name: Build Lizard Binaries (Debian 11 Compatible: x86 & ARM) - Debug

on:
  workflow_dispatch: # 允许手动触发
  push:
    tags:
      - 'v*' # 当推送标签时自动触发，例如 v1.0.0

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch_suffix: x86_64
            artifact_name: lizard-linux-${{ matrix.arch_suffix }}-debian11
          - platform: linux/arm64/v8
            arch_suffix: arm64
            artifact_name: lizard-linux-${{ matrix.arch_suffix }}-debian11

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建 Docker 镜像并在指定平台上运行构建过程
      - name: Build with Docker (Debian 11)
        env:
          TARGETPLATFORM: ${{ matrix.platform }}
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
        run: |
          # --- Start of Dockerfile Content ---
          # We write the Dockerfile content directly here using heredoc
          cat << 'EOF' > Dockerfile.debug
          ARG TARGETPLATFORM
          FROM --platform=$TARGETPLATFORM debian:bullseye-slim

          RUN apt-get update && \
              apt-get install -y --no-install-recommends \
                  python3.11 python3.11-dev python3.11-distutils \
                  python3-pip python3-setuptools \
                  build-essential gcc g++ make wget ca-certificates && \
              rm -rf /var/lib/apt/lists/*

          RUN python3.11 -m pip install --upgrade pip setuptools wheel

          WORKDIR /app

          COPY . .

          RUN python3.11 -m pip install nuitka zstandard && \
              python3.11 -m pip install .

          # Print working directory contents before building
          RUN echo "Contents of /app before build:" && ls -la /app/

          # Build the binary
          RUN python3.11 -m nuitka \
              --standalone \
              --onefile \
              --include-package=lizard \
              --assume-yes-for-downloads \
              --output-filename="${ARTIFACT_NAME}" \
              lizard.py

          # Print working directory contents after building
          RUN echo "Contents of /app after build:" && ls -la /app/

          # Ensure the binary has execute permissions
          RUN chmod +x "${ARTIFACT_NAME}"

          # Verify the binary exists and its permissions
          RUN test -f "${ARTIFACT_NAME}" && echo "Binary ${ARTIFACT_NAME} exists." || (echo "ERROR: Binary ${ARTIFACT_NAME} does NOT exist!" && exit 1)
          RUN stat -c "%a %n" "${ARTIFACT_NAME}"

          # Optional: Check glibc version inside the container (should be old)
          # RUN ldd --version

          CMD ["./${ARTIFACT_NAME}"]
          EOF
          # --- End of Dockerfile Content ---

          # Build the image
          docker build \
              --platform ${{ matrix.platform }} \
              --build-arg ARTIFACT_NAME="${{ matrix.artifact_name }}" \
              -t lizard-builder-debug:${{ matrix.arch_suffix }} \
              -f Dockerfile.debug .

          # Create a temporary container and copy the binary
          CONTAINER_ID=$(docker create lizard-builder-debug:${{ matrix.arch_suffix }})
          echo "Created container ID: $CONTAINER_ID"
          docker cp ${CONTAINER_ID}:/app/${{ matrix.artifact_name }} ./
          echo "Copied ${{ matrix.artifact_name }} from container."
          docker rm -v ${CONTAINER_ID} > /dev/null

      # Debug step: List files in the current directory before uploading
      - name: List files before upload
        run: |
          echo "Listing files in current directory:"
          ls -la
          echo "Looking for file: ${{ matrix.artifact_name }}"
          if [ -f "${{ matrix.artifact_name }}" ]; then
            echo "File '${{ matrix.artifact_name }}' found! Size: $(stat -c%s ${{ matrix.artifact_name }}) bytes"
            # Optional: Show file type
            file ${{ matrix.artifact_name }}
          else
            echo "ERROR: File '${{ matrix.artifact_name }}' was NOT found!"
            exit 1
          fi

      # Upload the binary as an artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 30
