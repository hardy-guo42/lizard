name: Build Lizard Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch_suffix: x86_64
            artifact_name: lizard-linux-x86_64-centos7
          - platform: linux/arm64/v8
            arch_suffix: arm64
            artifact_name: lizard-linux-arm64-centos7

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with Docker (CentOS 7 - glibc 2.17)
        run: |
          cat << 'EOF' > Dockerfile.build
          ARG TARGETPLATFORM
          FROM --platform=${TARGETPLATFORM} centos:7

          # Verify glibc version is 2.17
          RUN ldd --version | head -1

          RUN yum update -y && \
              yum install -y \
                  epel-release && \
              yum install -y \
                  python3.11 python3.11-devel \
                  gcc gcc-c++ make wget ca-certificates && \
              yum clean all && \
              rm -rf /var/cache/yum

          RUN python3.11 -m pip install --upgrade pip setuptools wheel

          WORKDIR /app

          COPY . .

          RUN python3.11 -m pip install nuitka zstandard && \
              python3.11 -m pip install .

          RUN python3.11 -m nuitka \
              --standalone \
              --onefile \
              --include-package=lizard \
              --assume-yes-for-downloads \
              --output-filename=lizard \
              lizard.py

          RUN chmod +x /app/lizard && \
              test -f /app/lizard && echo "✓ Binary created successfully" || (echo "✗ Binary creation failed" && exit 1)

          CMD ["./lizard"]
          EOF

          docker build \
              --platform ${{ matrix.platform }} \
              -t lizard-builder:${{ matrix.arch_suffix }} \
              -f Dockerfile.build .

          CONTAINER_ID=$(docker create lizard-builder:${{ matrix.arch_suffix }})
          echo "Container ID: $CONTAINER_ID"
          docker cp ${CONTAINER_ID}:/app/lizard ./${{ matrix.artifact_name }}
          echo "✓ Binary copied successfully"
          docker rm -v ${CONTAINER_ID} > /dev/null

      - name: Verify Binary & glibc Compatibility
        run: |
          if [ -f "${{ matrix.artifact_name }}" ]; then
            echo "✓ Binary found: ${{ matrix.artifact_name }}"
            file "${{ matrix.artifact_name }}"
            stat -c "Size: %s bytes" "${{ matrix.artifact_name }}"
            echo ""
            echo "=== glibc Compatibility Check ==="
            ldd "${{ matrix.artifact_name }}" | grep -i glibc || echo "✓ Static linking or compatible glibc"
          else
            echo "✗ Binary not found!"
            ls -la
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
