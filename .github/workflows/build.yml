name: Build Lizard Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch_suffix: x86_64
            artifact_name: lizard-linux-x86_64-centos7
          - platform: linux/arm64/v8
            arch_suffix: arm64
            artifact_name: lizard-linux-arm64-centos7

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with Docker (CentOS 7 - glibc 2.17)
        run: |
          cat << 'EOF' > Dockerfile.build
          ARG TARGETPLATFORM
          FROM --platform=${TARGETPLATFORM} centos:7

          # Verify glibc version is 2.17
          RUN ldd --version | head -1

          # 替换为 vault.centos.org 并使用 Python 3.9（官方支持）
          RUN rm -f /etc/yum.repos.d/*.repo && \
              cat > /etc/yum.repos.d/CentOS-Base.repo << 'REPO' && \
          [base]
          name=CentOS-$releasever - Base
          baseurl=http://vault.centos.org/centos/$releasever/os/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7

          [updates]
          name=CentOS-$releasever - Updates
          baseurl=http://vault.centos.org/centos/$releasever/updates/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7

          [extras]
          name=CentOS-$releasever - Extras
          baseurl=http://vault.centos.org/centos/$releasever/extras/$basearch/
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-CentOS-7
          REPO
              yum update -y && \
              yum install -y centos-release-scl && \
              yum install -y \
                  rh-python36 \
                  rh-python36-python-devel \
