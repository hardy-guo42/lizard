name: Build Lizard Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch_suffix: x86_64
            artifact_name: lizard-linux-x86_64-centos7
          - platform: linux/arm64/v8
            arch_suffix: arm64
            artifact_name: lizard-linux-arm64-centos7

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with Docker (CentOS 7 - glibc 2.17)
        run: |
          cat << 'EOF' > Dockerfile.build
          ARG TARGETPLATFORM
          FROM --platform=${TARGETPLATFORM} centos:7

          # Verify glibc version is 2.17
          RUN ldd --version | head -1

          # Replace CentOS repos with vault mirrors since CentOS 7 has reached EOL
          RUN sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-*.repo && \
              sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*.repo

          # Update packages and install required tools
          RUN yum update -y && \
              yum install -y centos-release-scl && \
              yum install -y \
                  rh-python36 \
                  rh-python36-python-devel \
                  gcc \
                  make && \
              yum clean all && \
              rm -rf /var/cache/yum

          RUN scl enable rh-python36 'pip install --upgrade pip setuptools wheel' && \
              scl enable rh-python36 'pip install pyinstaller pygments pathspec'

          WORKDIR /build
          COPY . .

          RUN scl enable rh-python36 'python setup.py install'
          RUN scl enable rh-python36 'pyinstaller --onefile --name=lizard --distpath=/build/dist lizard.py'

          FROM --platform=${TARGETPLATFORM} centos:7
          COPY --from=0 /build/dist/lizard /usr/local/bin/lizard
          RUN chmod +x /usr/local/bin/lizard && ldd /usr/local/bin/lizard
          EOF

          docker buildx build \
            --platform ${{ matrix.platform }} \
            --tag lizard-builder:${{ matrix.arch_suffix }} \
            -f Dockerfile.build \
            --output type=docker \
            .

      - name: Extract Binary from Docker Image
        run: |
          mkdir -p ./dist
          docker run --rm \
            -v $(pwd)/dist:/output \
            lizard-builder:${{ matrix.arch_suffix }} \
            sh -c 'cp /usr/local/bin/lizard /output/lizard-linux-${{ matrix.arch_suffix }}'

      - name: Verify Binary Compatibility
        run: |
          file ./dist/lizard-linux-${{ matrix.arch_suffix }}
          ldd ./dist/lizard-linux-${{ matrix.arch_suffix }} || echo "Binary is statically linked or uses non-standard libc"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lizard-linux_${{ matrix.arch_suffix }}-binary
          path: ./dist/lizard-linux-${{ matrix.arch_suffix }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/lizard-linux_x86-binary/lizard-linux-x86_64
            ./artifacts/lizard-linux_arm-binary/lizard-linux-arm64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
